name: Daily AI Companion

on:
  schedule:
    # 09:00 UTC = 5:00 PM Malaysia/Singapore Time
    - cron: '0 9 * * *'
  workflow_dispatch: # Keep this so you can still test manually!

jobs:
  run-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./daily_bot  # <-- Make sure this line is still here!

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run AI Bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node daily_bot.js
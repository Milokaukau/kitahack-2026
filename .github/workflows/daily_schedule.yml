name: Daily AI Companion

on:
  schedule:
    # Run at minute 0, every hour from 0 to 13 UTC (8 AM to 9 PM MYT)
    - cron: '0 0-13 * * *'
  workflow_dispatch: # Allows manual testing button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./daily_bot

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run AI Bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node daily_bot.js